<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Project Tracker — Casting Karma</title>
<style>
  :root{
    --bg:#f5f6f8; --ink:#0e1726; --ink2:#5b6676; --line:#e6e9ee; --card:#ffffff;
    --blue:#3b6ef5; --green:#16a34a; --amber:#d97706; --slate:#64748b; --violet:#6d28d9;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  header{background:var(--ink);color:#fff;padding:16px 22px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
  .brand{display:flex;align-items:center;gap:12px}
  .logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#3b6ef5,#6d28d9);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px}
  .brand h1{font-size:16px;margin:0;font-weight:700;letter-spacing:.2px}
  .brand .sub{font-size:12px;color:#9aa6b8;margin-top:1px}
  .htag{font-size:10px;font-weight:700;letter-spacing:.5px;background:rgba(255,255,255,.12);padding:3px 8px;border-radius:6px;color:#cfd6e2}
  .updated{font-size:11px;color:#9aa6b8}
  .wrap{max-width:1100px;margin:0 auto;padding:22px}
  .tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
  .tile{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .tile .k{font-size:11px;color:var(--ink2);font-weight:600;letter-spacing:.3px;text-transform:uppercase}
  .tile .v{font-size:26px;font-weight:800;margin-top:6px}
  .tile .v small{font-size:13px;font-weight:600;color:var(--ink2)}
  .tabs{display:flex;gap:8px;margin:4px 0 16px;border-bottom:1px solid var(--line)}
  .tab{appearance:none;border:none;background:none;cursor:pointer;font-family:inherit;font-size:13.5px;font-weight:700;color:var(--ink2);padding:10px 4px;margin-right:14px;border-bottom:2.5px solid transparent;display:flex;align-items:center;gap:7px}
  .tab .cnt{font-size:11px;font-weight:800;background:#eef1f5;color:var(--ink2);border-radius:999px;padding:1px 8px}
  .tab.active{color:var(--ink);border-bottom-color:var(--blue)}
  .tab.active .cnt{background:#e6efff;color:var(--blue)}
  .tabhint{font-size:12px;color:var(--ink2);margin:-6px 0 14px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;cursor:pointer;transition:.15s;position:relative}
  .card:hover{box-shadow:0 8px 24px rgba(15,23,42,.08);transform:translateY(-2px);border-color:#d7dce4}
  .ctop{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .chead{display:flex;gap:11px;align-items:flex-start;flex:1;min-width:0}
  .cicon{width:40px;height:40px;flex:0 0 40px;border-radius:10px;overflow:hidden;display:flex;align-items:center;justify-content:center}
  .cicon svg{display:block;width:40px;height:40px}
  .cinitial{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:17px}
  .cname{font-size:15px;font-weight:700;line-height:1.25}
  .platform{font-size:11px;color:var(--ink2);margin-top:3px;display:flex;align-items:center;gap:6px}
  .wsite{display:inline-block;margin-top:6px;font-size:11.5px;color:var(--blue);text-decoration:none;font-weight:700}
  .wsite:hover{text-decoration:underline}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--blue);display:inline-block}
  .pill{font-size:10px;font-weight:700;letter-spacing:.3px;padding:4px 9px;border-radius:999px;white-space:nowrap}
  .pill.build{background:#fff7ed;color:var(--amber)}
  .pill.live{background:#ecfdf3;color:var(--green)}
  .pill.greenlit{background:#e8f7ee;color:#0f8a3d;border:1px solid #bfe8cf}
  .pill.review{background:#eef2ff;color:#3b5bdb;border:1px solid #c7d2fe}
  .pill.possible{background:#f5f0ff;color:#6d28d9;border:1px solid #ddd0fb}
  .pill.planned{background:#f1f5f9;color:var(--slate)}
  .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}
  .kpi{background:#fafbfc;border:1px solid var(--line);border-radius:9px;padding:9px}
  .kpi .kk{font-size:10px;color:var(--ink2);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
  .kpi .kv{font-size:15px;font-weight:800;margin-top:3px}
  .cnote{font-size:11.5px;color:var(--ink2);margin-top:12px;display:flex;align-items:center;gap:6px}
  .cnote .src{margin-left:auto;font-size:10px;background:#f1f5f9;color:var(--slate);padding:2px 7px;border-radius:5px}
  .ov{position:fixed;inset:0;background:rgba(8,15,30,.55);display:none;align-items:center;justify-content:center;padding:20px;z-index:30}
  .ov.show{display:flex}
  .modal{background:#fff;border-radius:16px;max-width:540px;width:100%;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.3);max-height:86vh;overflow:auto}
  .modal h3{margin:0;font-size:18px}
  .modal .mp{font-size:12px;color:var(--ink2);margin-top:3px}
  .mclose{float:right;border:none;background:#f1f5f9;width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:16px;color:var(--ink2)}
  .mkpis{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:16px 0}
  .mkpi{background:#f0f6ff;border:1px solid #d8e6ff;border-radius:10px;padding:11px}
  .mkpi .kk{font-size:10px;color:#3b5bdb;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
  .mkpi .kv{font-size:18px;font-weight:800;margin-top:3px;color:#1e3a8a}
  .seclbl{font-size:11px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:#3b5bdb;margin:18px 0 7px}
  .ftab{width:100%;border-collapse:collapse;font-size:11.5px;margin-top:2px}
  .ftab th{text-align:left;color:#5b6676;font-weight:700;border-bottom:1px solid #e6e9ef;padding:5px 6px;white-space:nowrap}
  .ftab td{padding:5px 6px;border-bottom:1px solid #f1f5f9;color:#0e1726}
  .tierbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
  .tierpill{font-size:11px;font-weight:700;background:#f0f6ff;border:1px solid #d8e6ff;color:#1e3a8a;border-radius:8px;padding:5px 9px}
  .mrow{display:flex;justify-content:space-between;gap:14px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
  .mrow span:first-child{color:var(--ink2);white-space:nowrap}
  .mrow span:last-child{font-weight:600;text-align:right}
  .mlink{display:inline-block;margin:12px 8px 0 0;padding:8px 12px;border:1px solid #d8e6ff;background:#f0f6ff;border-radius:9px;color:#1e3a8a;font-weight:700;font-size:12.5px;text-decoration:none}
  .mlink:hover{background:#e2eeff}
  .linkchip{color:var(--blue);font-weight:700}
  footer{max-width:1100px;margin:0 auto;padding:8px 22px 30px;color:var(--ink2);font-size:11.5px}
  @media(max-width:760px){.tiles{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="logo">CK</div>
    <div><h1>Project Tracker</h1><div class="sub">Casting Karma LLC · <a href="https://castingkarmallc.com" target="_blank" rel="noreferrer" style="color:#9fb4ff;text-decoration:none">castingkarmallc.com ↗</a></div></div>

// ── RENDER ────────────────────────────────────────────────────────────
const money = n => "$"+n.toLocaleString();
let TAB = "active";
function iconHtml(p){
  if(p.icon) return p.icon;
  const colors={build:"#d97706",review:"#3b5bdb",live:"#16a34a",greenlit:"#0f8a3d",possible:"#6d28d9",planned:"#64748b"};
  const c = colors[p.status] || "#64748b";
  const ch = (p.name||"?").replace(/[^A-Za-z0-9]/,"").charAt(0).toUpperCase();
  return `<div class="cinitial" style="background:${c}">${ch}</div>`;
}
const STATUS = {build:["build","In build"], review:["review","In review"], live:["live","Live"], greenlit:["greenlit","Green-lit"], possible:["possible","Possible"], planned:["planned","Planned"]};

function renderTiles(){
  const inReview = PROJECTS.filter(p=>p.status==="review").length;
  const inBuild = PROJECTS.filter(p=>p.status==="build").length;
  const possible = PROJECTS.filter(p=>p.group==="possible").length;
  const tiles = [
    {k:"Total MRR", v:money(0)+" <small>/mo</small>"},
    {k:"In review", v:inReview},
    {k:"In build", v:inBuild},
    {k:"Possible projects", v:possible}
  ];
  document.getElementById("tiles").innerHTML = tiles.map(t=>
    `<div class="tile"><div class="k">${t.k}</div><div class="v">${t.v}</div></div>`).join("");
}

function renderTabs(){
  const nActive = PROJECTS.filter(p=>p.group==="active").length;
  const nPoss = PROJECTS.filter(p=>p.group==="possible").length;
  document.getElementById("tabs").innerHTML =
    `<button class="tab ${TAB==='active'?'active':''}" onclick="setTab('active')">Active Builds <span class="cnt">${nActive}</span></button>
     <button class="tab ${TAB==='possible'?'active':''}" onclick="setTab('possible')">Possible Projects <span class="cnt">${nPoss}</span></button>`;
  document.getElementById("tabhint").textContent = TAB==="active"
    ? "Projects in active build or marketplace review. Tap a card for details & MRR forecasts."
    : "Researched & scored, not green-lit. Tap a card for the wedge, demand, and risk. Nothing here is committed.";
}
function setTab(t){ TAB=t; renderTabs(); renderGrid(); }

function card(p){
  const [cls,label] = STATUS[p.status];
  const kpis = (p.kpis||[]).map(x=>`<div class="kpi"><div class="kk">${x.k}</div><div class="kv">${x.v}</div></div>`).join("");
  return `<div class="card" onclick='openModal("${p.id}")'>
    <div class="ctop">
      <div class="chead">
        <div class="cicon">${iconHtml(p)}</div>
        <div><div class="cname">${p.name}</div>
          <div class="platform"><span class="dot"></span>${p.platform}</div>
          ${p.website?`<a class="wsite" href="${p.website}" target="_blank" rel="noreferrer" onclick="event.stopPropagation()">🌐 ${p.website.replace(/^https?:\/\//,'')} ↗</a>`:""}</div>
      </div>
      <span class="pill ${cls}">${label}</span>
    </div>
    <div class="kpis">${kpis}</div>
    <div class="cnote">${p.note}${p.links?` <span class="linkchip">· 🔗 ${p.links.length}</span>`:""}<span class="src">${p.source}</span></div>
  </div>`;
}

function renderGrid(){
  document.getElementById("grid").innerHTML = PROJECTS.filter(p=>p.group===TAB).map(card).join("");
}

function openModal(id){
  const p = PROJECTS.find(x=>x.id===id);
  const [cls,label] = STATUS[p.status];
  const rows = Object.entries(p.detail).map(([k,v])=>
    `<div class="mrow"><span>${k}</span><span>${v}</span></div>`).join("");
  const mk = (p.modalKpis||[]).map(x=>`<div class="mkpi"><div class="kk">${x.k}</div><div class="kv">${x.v}</div></div>`).join("");
  document.getElementById("modal").innerHTML =
    `<button class="mclose" onclick="closeModal()">×</button>
     <div style="display:flex;gap:12px;align-items:center">
       <div class="cicon">${iconHtml(p)}</div>
       <div><h3>${p.name}</h3><div class="mp">${p.platform} &nbsp;·&nbsp; <span class="pill ${cls}">${label}</span>${p.website?` &nbsp;·&nbsp; <a href="${p.website}" target="_blank" rel="noreferrer" class="linkchip">🌐 ${p.website.replace(/^https?:\/\//,'')} ↗</a>`:""}</div></div>
     </div>
     ${mk?`<div class="mkpis">${mk}</div>`:""}
     <div class="mrow"><span>MRR today</span><span>${money(p.mrr)} · ${p.customers} customers · ${p.trials} trials</span></div>
     ${rows}
     ${p.liveTiers ? `<div class="seclbl">Live — installs &amp; users by tier</div>
       <div class="mrow"><span>Total installs</span><span>${p.liveTiers.installs} &nbsp;·&nbsp; ${p.status==='review'?'in review (not live)':'live'}</span></div>
       <div class="tierbar">
         <span class="tierpill">Free: ${p.liveTiers.free}</span>
         <span class="tierpill">Starter $19: ${p.liveTiers.starter}</span>
         <span class="tierpill">Growth $49: ${p.liveTiers.growth}</span>
         <span class="tierpill">Pro $99: ${p.liveTiers.pro}</span>
       </div>
       <div class="mrow" style="margin-top:8px"><span>MRR (live)</span><span>${money(p.liveTiers.mrr)}</span></div>` : ""}
     ${p.funnel ? `<div class="seclbl">Most-realistic forecast · post-approval clock</div>
       <table class="ftab"><tr><th>Period</th><th>Installs*</th><th>Active</th><th>Paying (S/G/P)</th><th>MRR (end)</th><th>Cash</th></tr>
       ${p.funnel.map(f=>`<tr><td>${f.period}</td><td>${f.installs}</td><td>${f.active}</td><td>${f.paying} (${f.tiers})</td><td>${f.mrr}</td><td>${f.cash}</td></tr>`).join("")}</table>
       <div class="cnote" style="margin-top:8px">*Installs cumulative. Base case; downside ≈ near-zero (discovery fails), upside ≈ 2–3× (reviews + a forum thread land).</div>` : ""}
     ${(p.links||[]).map(l=>`<a class="mlink" href="${l.url}" target="_blank" rel="noreferrer">${l.label} ↗</a>`).join("")}
     <div class="cnote" style="margin-top:14px">${p.group==='possible'?'Possible project — researched, not committed. Scores from Discovery Sprint v3 (·/5).':'Forecasts are mid-case modeled ranges (±50%), post-launch clock.'}<span class="src">${p.source}</span></div>`;
  document.getElementById("ov").classList.add("show");
}
function closeModal(){ document.getElementById("ov").classList.remove("show"); }

document.getElementById("updated").textContent = "Updated " + new Date().toLocaleString();
document.getElementById("footer").innerHTML =
  "Active builds = monday Cert Tracker (in review) + DueBell (in build). Possible Projects = researched & scored, not green-lit (Discovery Sprint v3, 2026-06-09). MRR-now figures are placeholders until live-data wiring. Internal use only.";
renderTiles(); renderTabs(); renderGrid();
</script>
</body>
</html>
